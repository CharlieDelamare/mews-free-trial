name: Claude Auto-Implement

on:
  issues:
    types: [labeled]

jobs:
  claude:
    if: github.event.label.name == 'claude'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          show_full_output: true
          settings: |
            {
              "permissions": {
                "allow": ["Edit", "Write", "Bash"]
              }
            }
          prompt: |
            You are an expert software engineer. Implement the following GitHub issue:

            Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}

            ${{ github.event.issue.body }}

            IMPORTANT INSTRUCTIONS:
            1. Create a new branch named "claude/issue-${{ github.event.issue.number }}" before making any changes
            2. Make all changes on that branch — NEVER commit directly to main
            3. Follow the existing code style and conventions in the repo
            4. Write clean, well-structured code
            5. When done, open a pull request from your branch to main with a clear description of what you changed and why

            If the issue is unclear or lacks enough detail to implement safely, leave a comment on issue #${{ github.event.issue.number }} explaining what additional information is needed.
